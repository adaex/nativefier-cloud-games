name: Build & Release

on:
  schedule:
    - cron: '0 10 * * 5' # 每周五 UTC 10:00 (北京时间 18:00)
  workflow_dispatch: # 手动触发

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: packager
        run: npm ci

      - name: Get Electron version
        id: electron
        run: echo "version=$(npm view electron version)" >> "$GITHUB_OUTPUT"

      - name: Build apps
        working-directory: packager
        run: npx tsx src/cli.ts ../apps/*.json

      - name: Zip apps
        run: |
          for cfg in apps/*.json; do
            app_id=$(basename "$cfg" .json)
            app_name=$(node -e "process.stdout.write(require('./$cfg').name)")
            app_dir="dist/${app_name}-darwin-arm64"
            app=$(find "$app_dir" -maxdepth 1 -name "*.app" -type d | head -1)
            if [ -n "$app" ]; then
              ditto -c -k --keepParent "$app" "dist/${app_id}-darwin-arm64.zip"
              echo "Zipped: ${app_id}-darwin-arm64.zip"
            fi
          done

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="v${{ steps.electron.outputs.version }}"
          # 同一 Electron 版本已有 Release 则删除重建（上次可能上传失败）
          if gh release view "$tag" > /dev/null 2>&1; then
            gh release delete "$tag" --yes
            git push --delete origin "$tag" 2>/dev/null || true
          fi
          gh release create "$tag" dist/*.zip \
            --title "Electron ${{ steps.electron.outputs.version }}" \
            --notes "基于 Electron ${{ steps.electron.outputs.version }} 自动构建 macOS arm64 版本" \
            --latest
