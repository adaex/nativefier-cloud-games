name: Build & Release

on:
  schedule:
    - cron: '0 10 * * 5' # 每周五 UTC 10:00 (北京时间 18:00)
  workflow_dispatch: # 手动触发

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Get Electron version
        id: electron
        run: echo "version=$(npm view electron version)" >> "$GITHUB_OUTPUT"

      - name: Build apps
        run: npx tsx packager/cli.ts webs/*/config.json
        env:
          ELECTRON_VERSION: ${{ steps.electron.outputs.version }}

      - name: Zip apps
        run: |
          for dir in webs/*/; do
            app_id=$(basename "$dir")
            app_name=$(node -e "process.stdout.write(require('./${dir}config.json').name)")
            app_dir="dist/${app_name}-darwin-arm64"
            app=$(find "$app_dir" -maxdepth 1 -name "*.app" -type d | head -1)
            if [ -n "$app" ]; then
              ditto -c -k --keepParent "$app" "dist/${app_id}-darwin-arm64.zip"
              echo "Zipped: ${app_id}-darwin-arm64.zip"
            fi
          done

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="v${{ steps.electron.outputs.version }}"
          # 同一 Electron 版本已有 Release 则删除重建（上次可能上传失败）
          if gh release view "$tag" > /dev/null 2>&1; then
            gh release delete "$tag" --yes
            git push --delete origin "$tag" 2>/dev/null || true
          fi
          gh release create "$tag" dist/*.zip \
            --title "$tag" \
            --notes "自动构建 macOS arm64 版本" \
            --latest
